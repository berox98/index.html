<html>
  <head>
    <meta charset="UTF-8">
    <title>AI-Driven Evolutionary Racer</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <div id="sidebar">
        <h2>Evolutionary Racer</h2>
        <div id="info">
          <p>Generation: <span id="generation">1</span></p>
          <p>Race Time: <span id="timer">20.0</span>s</p>
          <button id="startRace">Start Race</button>
          <hr>
          <h3>Genetic Parameters</h3>
          <p id="genetics">...</p>
        </div>
      </div>
      <div id="arena">
        <canvas id="gameCanvas"></canvas>
      </div>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
