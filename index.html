<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Comic Generator</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="Generate amazing comic strips using AI">
</head>
<body>
  <div class="container">
    <h1>MELONPE</h1>
    
    <div class="input-section">
      <div class="style-selector">
        <h3>Choose Art Style:</h3>
        <div class="style-options">
          <label class="style-option">
            <input type="radio" name="artStyle" value="cartoon" checked>
            <span class="style-preview cartoon">
              <svg viewBox="0 0 50 50" width="50" height="50">
                <circle cx="25" cy="25" r="20" fill="#FFD700"/>
                <circle cx="18" cy="20" r="4" fill="#000"/>
                <circle cx="32" cy="20" r="4" fill="#000"/>
                <path d="M15 30 Q25 40 35 30" fill="none" stroke="#000" stroke-width="3"/>
              </svg>
              <span>Cartoon</span>
            </span>
          </label>
          <label class="style-option">
            <input type="radio" name="artStyle" value="realistic">
            <span class="style-preview realistic">
              <svg viewBox="0 0 50 50" width="50" height="50">
                <circle cx="25" cy="25" r="20" fill="#E6C8A0"/>
                <ellipse cx="18" cy="20" rx="3" ry="4" fill="#402010"/>
                <ellipse cx="32" cy="20" rx="3" ry="4" fill="#402010"/>
                <path d="M15 32 Q25 38 35 32" fill="none" stroke="#402010" stroke-width="2"/>
                <path d="M10 15 Q25 5 40 15" fill="none" stroke="#724630" stroke-width="3"/>
              </svg>
              <span>Realistic</span>
            </span>
          </label>
          <label class="style-option">
            <input type="radio" name="artStyle" value="manga">
            <span class="style-preview manga">
              <svg viewBox="0 0 50 50" width="50" height="50">
                <path d="M10 5 L40 5 L40 45 L10 45 Z" fill="white" stroke="black" stroke-width="2"/>
                <path d="M15 15 L35 15" stroke="black" stroke-width="3"/>
                <path d="M13 25 L18 20 L23 25" fill="none" stroke="black" stroke-width="2"/>
                <path d="M27 25 L32 20 L37 25" fill="none" stroke="black" stroke-width="2"/>
                <path d="M20 35 L30 35" stroke="black" stroke-width="2"/>
                <path d="M5 10 L8 8" stroke="black" stroke-width="1"/>
                <path d="M42 10 L45 8" stroke="black" stroke-width="1"/>
              </svg>
              <span>Manga</span>
            </span>
          </label>
          <label class="style-option">
            <input type="radio" name="artStyle" value="pixel">
            <span class="style-preview pixel">
              <svg viewBox="0 0 50 50" width="50" height="50">
                <rect x="0" y="0" width="50" height="50" fill="#000"/>
                <rect x="10" y="10" width="30" height="30" fill="#FFF"/>
                <rect x="15" y="20" width="5" height="5" fill="#000"/>
                <rect x="20" y="20" width="5" height="5" fill="#000"/>
                <rect x="30" y="20" width="5" height="5" fill="#000"/>
                <rect x="25" y="20" width="5" height="5" fill="#000"/>
                <rect x="20" y="30" width="5" height="5" fill="#000"/>
                <rect x="25" y="30" width="5" height="5" fill="#000"/>
              </svg>
              <span>Pixel Art</span>
            </span>
          </label>
          <label class="style-option">
            <input type="radio" name="artStyle" value="microscopic">
            <span class="style-preview microscopic">
              <svg viewBox="0 0 50 50" width="50" height="50">
                <circle cx="25" cy="25" r="24" fill="#000" />
                <circle cx="25" cy="25" r="22" fill="#0F0" fill-opacity="0.1" />
                <circle cx="25" cy="25" r="15" fill="none" stroke="#0F0" stroke-width="0.5" />
                <circle cx="25" cy="25" r="10" fill="#0F0" fill-opacity="0.2" />
                <circle cx="20" cy="20" r="3" fill="#0F0" fill-opacity="0.3" />
                <circle cx="30" cy="30" r="4" fill="#0F0" fill-opacity="0.3" />
                <circle cx="28" cy="18" r="2" fill="#0F0" fill-opacity="0.4" />
                <line x1="0" y1="25" x2="50" y2="25" stroke="#0F0" stroke-width="0.2" />
                <line x1="25" y1="0" x2="25" y2="50" stroke="#0F0" stroke-width="0.2" />
              </svg>
              <span>Microscopic</span>
            </span>
          </label>
          <label class="style-option">
            <input type="radio" name="artStyle" value="stick-figure">
            <span class="style-preview stick-figure">
              <svg viewBox="0 0 50 50" width="50" height="50">
                <circle cx="25" cy="15" r="8" fill="none" stroke="#000" stroke-width="2"/>
                <line x1="25" y1="23" x2="25" y2="35" stroke="#000" stroke-width="2"/>
                <line x1="25" y1="35" x2="15" y2="45" stroke="#000" stroke-width="2"/>
                <line x1="25" y1="35" x2="35" y2="45" stroke="#000" stroke-width="2"/>
                <line x1="15" y1="30" x2="35" y2="30" stroke="#000" stroke-width="2"/>
                <circle cx="22" cy="15" r="1" fill="#000"/>
                <circle cx="28" cy="15" r="1" fill="#000"/>
                <line x1="23" y1="18" x2="27" y2="18" stroke="#000" stroke-width="1"/>
              </svg>
              <span>Stick Figure</span>
            </span>
          </label>
          <label class="style-option">
            <input type="radio" name="artStyle" value="mixed">
            <span class="style-preview mixed">
              <svg viewBox="0 0 50 50" width="50" height="50">
                <rect x="0" y="0" width="25" height="25" fill="#FFD700"/>
                <circle cx="8" cy="10" r="3" fill="#000"/>
                <path d="M3 18 Q12 25 20 18" fill="none" stroke="#000" stroke-width="2"/>
                
                <rect x="25" y="0" width="25" height="25" fill="#000"/>
                <rect x="30" y="5" width="15" height="15" fill="#FFF"/>
                <rect x="33" y="8" width="3" height="3" fill="#000"/>
                
                <circle cx="12" cy="38" r="10" fill="#E6C8A0"/>
                <ellipse cx="9" cy="35" rx="2" ry="3" fill="#402010"/>
                
                <circle cx="38" cy="38" r="10" fill="#000"/>
                <circle cx="38" cy="38" r="8" fill="#0F0" fill-opacity="0.2"/>
                <circle cx="35" cy="35" r="2" fill="#0F0" fill-opacity="0.4"/>
              </svg>
              <span>All Together</span>
            </span>
          </label>
          <label class="style-option">
            <input type="radio" name="artStyle" value="custom" id="customStyleRadio">
            <span class="style-preview custom" id="customStylePreview">
              <svg viewBox="0 0 50 50" width="50" height="50">
                <rect x="5" y="5" width="40" height="40" fill="#eee" stroke="#666" stroke-width="2" stroke-dasharray="4"/>
                <text x="25" y="30" text-anchor="middle" fill="#666" font-size="30">+</text>
              </svg>
              <span>Create Your Style</span>
            </span>
          </label>
        </div>
      </div>
      
      <div class="marketplace-button-container">
        <button id="openMarketplace" class="marketplace-button">
          <svg viewBox="0 0 24 24" width="24" height="24" class="marketplace-icon">
            <path fill="currentColor" d="M12,18C8.7,18 6,15.3 6,12C6,8.7 8.7,6 12,6C15.3,6 18,8.7 18,12C18,15.3 15.3,18 12,18M12,4C7.6,4 4,7.6 4,12C4,16.4 7.6,20 12,20C16.4,20 20,16.4 20,12C20,7.6 16.4,4 12,4M12,2C17.5,2 22,6.5 22,12C22,17.5 17.5,22 12,22C6.5,22 2,17.5 2,12C2,6.5 6.5,2 12,2M12,7C9.2,7 7,9.2 7,12C7,14.8 9.2,17 12,17C14.8,17 17,14.8 17,12C17,9.2 14.8,7 12,7Z"/>
          </svg>
          Browse Marketplace
        </button>
      </div>

      <textarea id="storyInput" placeholder="Describe your comic story here... 

Example: A funny story about a cat trying to catch a mouse in a modern apartment. The cat uses technology but keeps failing in humorous ways.

For microscopic view, try describing cellular or microscopic scenes like:
- Bacteria interacting in a petri dish
- White blood cells fighting viruses
- Microscopic organisms in a water drop
- Cell division process

For stick figure style, try simple scenarios like:
- A stick figure learning to ride a bicycle
- Stick figures playing sports
- A stick figure's daily routine
- Simple stick figure adventures

Try to be specific about:
- Characters and their appearances
- Setting and environment
- Actions and events
- Mood and tone
- Any specific visual elements you want to include"></textarea>
      <button id="generateBtn">Generate Comic</button>
    </div>

    <div class="comic-container" id="comicContainer">
      <!-- Comic panels will be generated here -->
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Creating your comic masterpiece... This may take a minute!</p>
    </div>

    <div id="customStyleModal" class="modal">
      <div class="modal-content">
        <h2>Create Your Own Style</h2>
        <input type="text" id="styleName" placeholder="Style Name">
        <textarea id="styleDescription" placeholder="Describe how the art should look (be specific about colors, textures, techniques, etc.)"></textarea>
        <div class="modal-buttons">
          <button id="generateStyleIcon">Generate Icon</button>
          <button id="saveStyle">Save Style</button>
          <button id="cancelStyle">Cancel</button>
        </div>
        <div id="stylePreview" class="style-preview-container">
          <!-- Preview will be shown here -->
        </div>
      </div>
    </div>

    <div id="marketplaceModal" class="modal">
      <div class="modal-content marketplace-content">
        <div class="marketplace-header">
          <h2>Style Marketplace</h2>
          <div class="marketplace-tabs">
            <button class="tab-button active" data-tab="browse">Browse Styles</button>
            <button class="tab-button" data-tab="mystyles">My Styles</button>
            <button class="tab-button" data-tab="publish">Publish Style</button>
          </div>
        </div>
        
        <div class="tab-content" id="browseContent">
          <div class="marketplace-search">
            <input type="text" id="searchStyles" placeholder="Search styles...">
          </div>
          <div class="marketplace-grid" id="styleGrid">
            <!-- Styles will be populated here -->
          </div>
        </div>

        <div class="tab-content hidden" id="mystylesContent">
          <div class="marketplace-search">
            <input type="text" id="searchMyStyles" placeholder="Search my styles...">
          </div>
          <div class="marketplace-grid" id="myStyleGrid">
            <!-- User's added styles will be populated here -->
          </div>
        </div>

        <div class="tab-content hidden" id="publishContent">
          <div class="publish-form">
            <input type="text" id="publishStyleName" placeholder="Style Name">
            <textarea id="publishStyleDescription" placeholder="Describe your style in detail..."></textarea>
            <div class="publish-preview" id="publishPreview">
              <!-- Preview will be shown here -->
            </div>
            <button id="generateMarketplaceIcon">Generate Preview</button>
            <button id="publishStyle">Publish Style</button>
          </div>
        </div>

        <button class="close-modal" id="closeMarketplace">×</button>
      </div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
