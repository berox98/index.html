<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Your Whopper</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Build Your Whopper</h1>
            <p>Make the burger according to the order, then serve it</p>
        </header>
        
        <div class="order-container">
            <div class="order-title">Current Order:</div>
            <div class="order-ingredients" id="order-ingredients">
                <!-- Order items will be added here -->
            </div>
        </div>
        
        <div class="burger-container">
            <div class="burger" id="burger">
                <div class="ingredient bun-top">
                    <svg viewBox="0 0 200 50" class="bun-svg">
                        <path d="M10,40 C30,10 170,10 190,40 L190,50 L10,50 Z" fill="#f8c56d"/>
                        <path d="M10,40 C30,30 170,30 190,40" fill="none" stroke="#e8b55d" stroke-width="2"/>
                        <path d="M20,38 C20,34 25,34 25,38" fill="none" stroke="#e8b55d" stroke-width="1"/>
                        <path d="M40,36 C40,32 45,32 45,36" fill="none" stroke="#e8b55d" stroke-width="1"/>
                        <path d="M60,38 C60,34 65,34 65,38" fill="none" stroke="#e8b55d" stroke-width="1"/>
                        <path d="M80,37 C80,33 85,33 85,37" fill="none" stroke="#e8b55d" stroke-width="1"/>
                        <path d="M100,39 C100,35 105,35 105,39" fill="none" stroke="#e8b55d" stroke-width="1"/>
                        <path d="M120,36 C120,32 125,32 125,36" fill="none" stroke="#e8b55d" stroke-width="1"/>
                        <path d="M140,38 C140,34 145,34 145,38" fill="none" stroke="#e8b55d" stroke-width="1"/>
                        <path d="M160,37 C160,33 165,33 165,37" fill="none" stroke="#e8b55d" stroke-width="1"/>
                        <path d="M180,39 C180,35 185,35 185,39" fill="none" stroke="#e8b55d" stroke-width="1"/>
                    </svg>
                </div>
                <!-- Ingredients will go here -->
                <div class="ingredient bun-bottom">
                    <svg viewBox="0 0 200 30" class="bun-svg">
                        <path d="M10,0 L190,0 L190,15 C170,30 30,30 10,15 Z" fill="#f8c56d"/>
                        <path d="M10,15 C30,25 170,25 190,15" fill="none" stroke="#e8b55d" stroke-width="2"/>
                    </svg>
                </div>
            </div>
            
            <div class="side-items">
                <div class="side-item-container" id="fries-item">
                    <div class="side-item-label">Add Fries?</div>
                    <button id="add-fries-button" class="side-item-button">Add Fries</button>
                    <div class="fries-container" id="fries-container">
                        <div class="fries">
                            <div class="fry"></div>
                            <div class="fry"></div>
                            <div class="fry"></div>
                            <div class="fry"></div>
                            <div class="fry"></div>
                            <div class="fries-box"></div>
                        </div>
                    </div>
                </div>
                
                <div class="side-item-container" id="cola-item">
                    <div class="side-item-label">Add Cola?</div>
                    <button id="add-cola-button" class="side-item-button">Add Cola</button>
                    <div class="cola-container" id="cola-container">
                        <div class="cola">
                            <div class="cola-cup">
                                <div class="cola-liquid">
                                    <div class="bubble"></div>
                                    <div class="bubble"></div>
                                    <div class="bubble"></div>
                                </div>
                                <div class="cola-bubbles"></div>
                            </div>
                            <div class="cola-straw"></div>
                        </div>
                    </div>
                </div>
                
                <div class="side-item-container" id="nuggets-item">
                    <div class="side-item-label">Add Nuggets?</div>
                    <button id="add-nuggets-button" class="side-item-button">Add Nuggets</button>
                    <div class="nuggets-container" id="nuggets-container">
                        <div class="nuggets">
                            <div class="nugget"></div>
                            <div class="nugget"></div>
                            <div class="nugget"></div>
                            <div class="nugget"></div>
                            <div class="nuggets-box"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <button id="serve-button" class="serve-button">SERVE IT!</button>
            
            <div class="stats">
                <div>Score: <span id="score">0</span></div>
                <div>Level: <span id="level">1</span></div>
                <button id="auto-mode-button" class="auto-mode-button">Turn On Auto Mode</button>
                <button id="tts-mode-button" class="tts-mode-button">Turn On TTS</button>
                <!-- Speedrun button will be added here via JavaScript -->
            </div>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        
        <div class="ingredients-panel">
            <h2>Ingredients</h2>
            <div class="ingredients-list">
                <button data-ingredient="patty">Beef Patty</button>
                <button data-ingredient="double-patty">Double Patty</button>
                <button data-ingredient="triple-patty">Triple Patty</button>
                <button data-ingredient="cheese">Cheese</button>
                <button data-ingredient="lettuce">Lettuce</button>
                <button data-ingredient="tomato">Tomato</button>
                <button data-ingredient="onion">Onion</button>
                <button data-ingredient="pickle">Pickle</button>
                <button data-ingredient="bacon">Bacon</button>
                <button data-ingredient="egg">Fried Egg</button>
                <button data-ingredient="jalapeno">Jalapeño</button>
                <button data-ingredient="guacamole">Guacamole</button>
                <button data-ingredient="mayo">Mayo</button>
                <button data-ingredient="ketchup">Ketchup</button>
                <button data-ingredient="mustard">Mustard</button>
            </div>
        </div>
        
        <div class="message" id="message">Perfect!</div>
    </div>
</body>
</html>
